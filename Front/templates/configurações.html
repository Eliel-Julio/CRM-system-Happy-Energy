<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Happy Energy - Gerador de Propostas Comerciais</title>
    <style>
        .container-lg {
            display: flex;
            flex-direction: row;
            nav{
                width: 250px;
                margin-right: 20px;
                ul{
                    list-style: none;
                    padding: 0;
                    li{
                        padding: 10px;
                        margin: 5px;
                        cursor: pointer;
                        border-radius: 5px;
                        padding: auto;
                        &.active {
                            background-color: rgba(0, 0, 60, 0.2);
                        }
                        &:hover {
                            background-color: rgba(0, 0, 0, 0.1);
                        }
                    }
                }
            }
            .container{
                width: 100%;
            }
        }
    </style>
</head>
<body data-bs-theme=darkk>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="bi bi-lightning-fill"></i> Happy Energy
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#configurações"><i class="bi bi-box"></i> Configurações</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="#Kits-container"><i class="bi bi-box"></i> Kits</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#Leads-container"><i class="bi bi-people"></i> Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#Propostas-container"><i class="bi bi-file-earmark-text"></i> Propostas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<main class="container-fluid px-4 px-lg-5">
    <!-- Hero Section -->
    <div class="hero-section">
        <div class="container">
            <h1><i class="bi bi-gear"></i> Configurações</h1>
            <p class="lead mb-0">Gerencie as configurações do sistema de forma simples e profissional.</p>
        </div>
    </div>

    <div class="container-lg">
        <nav>
            <ul>
                <!-- O data-form agora guarda o nome/caminho do arquivo HTML externo -->
                <li data-form="{{ url_for('static', filename='form-constantes.html') }}">Constantes e Variáveis</li>
                <li data-form="{{ url_for('static', filename='form-sistema.html') }}">Configurações do Sistema</li>
            </ul>
        </nav>
        <!-- Onde o formulário externo será injetado -->
        <div class="container" id="form-container">
            <p class="text-muted">Selecione uma opção acima para começar.</p>
        </div>
    </div>
</main>

<!-- Footer -->
<footer class="footer"></footer>
<script>
    const container = document.getElementById('form-container');
    const links = document.querySelectorAll('nav li[data-form]');

    links.forEach(link => {
        link.addEventListener('click', async function(event) {
            event.preventDefault();

            // Pega o caminho do arquivo (ex: "form-constantes.html")
            const arquivoUrl = this.getAttribute('data-form');

            // Exibe uma mensagem visual de que está carregando (opcional, mas boa prática)
            container.innerHTML = '<p class="text-muted">Carregando formulário...</p>';

            try {
                // Faz a requisição para buscar o arquivo HTML externo
                const resposta = await fetch(arquivoUrl);
                
                // Se o arquivo não for encontrado (Erro 404, por exemplo)
                if (!resposta.ok) {
                    throw new Error('Não foi possível carregar o formulário.');
                }

                // Transforma a resposta em texto puro (HTML)
                const htmlDoFormulario = await resposta.text();

                // Injeta o HTML dentro do container
                container.innerHTML = htmlDoFormulario;

            } catch (erro) {
                // Caso dê erro de rede ou o arquivo não exista
                container.innerHTML = `<p class="text-danger">Erro: ${erro.message}</p>`;
            }
            event.target.classList.add('active');
             // Remove a classe 'active' dos outros links
            links.forEach(link => {
                if (link !== event.target) {
                    link.classList.remove('active');
                }
            });
        });
    });
</script>
<script src="{{ url_for('static', filename='templats.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
