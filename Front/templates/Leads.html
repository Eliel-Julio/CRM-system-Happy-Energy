<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Gerenciar Leads - Happy Energy</title>
    <style>
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-lightning-fill"></i> Happy Energy
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/kits"><i class="bi bi-box"></i> Kits</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#"><i class="bi bi-people"></i> Leads</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/propostas"><i class="bi bi-file-earmark-text"></i> Propostas</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <main class="container-fluid px-4 px-lg-5">
        <div class="hero-section">
            <div class="container">
                <h1><i class="bi bi-person-bounding-box"></i> Gerenciar Leads</h1>
                <p class="lead mb-0">Crie e organize seus leads para gerar propostas profissionais.</p>
            </div>
        </div>

        <div class="container-lg">
            <!-- Form Section: Adicionar Novo lead -->
            <div class="form-section">
                <h3><i class="bi bi-plus-circle"></i> Novo lead</h3>
                <form id="formNovoLead">
                    <div class="form-grid-compact">
                        <!-- Row 1: Informações Básicas -->
                        <!-- nome = Column(String, nullable=False) -->
                        <div class="form-group-compact">
                            <label for="Nome-completo" class="form-label">Nome completo*</label>
                            <input type="text" class="form-control" id="Nome-completo" placeholder="Nome do cliente" required>
                        </div>
                        <!-- cpf = Column(String, nullable=False, unique=True) -->
                        <div class="form-group-compact">
                            <label for="cpf" class="form-label">CPF *</label>
                            <input type="text" inputmode="numeric" class="form-control" id="cpf" step="1" maxlength="14">
                        </div>
                        <!-- email = Column(String, nullable=False) -->
                        <div class="form-group-compact">
                            <label for="email" class="form-label">Email *</label>
                            <input type="email" inputmode="email" class="form-control" id="email">
                        </div>
                        <!-- telefone = Column(String, nullable=False) -->
                        <div class="form-group-compact">
                            <label for="telefone" class="form-label">Telefone *</label>
                            <input type="text" inputmode="tel" class="form-control" id="telefone" placeholder="(00) 00000-0000">
                        </div>
                        <!-- cidade_UF = Column(String, nullable=False) -->
                        <div class="form-group-compact">
                            <label for="cidade-UF" class="form-label">Cidade-UF *</label>
                            <input type="text" class="form-control" id="cidade-UF" placeholder="Cidade, UF" required>
                        </div>
                        <div class="form-group-compact form-grid-full">
                            <label for="descricaoLead" class="form-label">Descrição</label>
                            <textarea class="form-control" id="descricaoLead" rows="2" placeholder="Detalhes adicionais..."></textarea>
                        </div>
                    </div>

                    <div class="btn-form-group">
                        <button type="submit" class="btn btn-primary btn-sm">
                            <i class="bi bi-plus"></i> Adicionar
                        </button>
                        <button type="reset" class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-arrow-clockwise"></i> Limpar
                        </button>
                    </div>
                </form>
            </div>

            <!-- Leads List Section -->
            <div class="section-card">
                <div class="card-header">
                    <h2><i class="bi bi-list-ul"></i> Listagem de Leads</h2>
                </div>
                <div class="card-body">
                    <!-- Filter and Search -->
                    <div class="row g-2 mb-2">
                        <div class="col-md-6">
                            <input type="text" class="form-control form-control-sm" id="searchLead" placeholder="Buscar por nome...">
                        </div>
                        <div class="col-md-6">
                            <select class="form-select form-select-sm" id="filterCategoria">
                                <option value="">Todas as categorias</option>
                                <option value="solar">Solar</option>
                                <option value="eolica">Eólica</option>
                                <option value="hibrido">Híbrido</option>
                                <option value="baterias">Baterias</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                    </div>
                    <div id="leadsContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Happy Energy. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
        // Gerenciamento de Leads
        let leads = [];

        const formNovoLead = document.getElementById('formNovoLead');
        const leadsContainer = document.getElementById('leadsContainer');
        const searchLead = document.getElementById('searchLead');
        const filterCategoria = document.getElementById('filterCategoria');

        // Adicionar novo lead
        formNovoLead.addEventListener('submit', async (e) => {
            e.preventDefault();
            const novoLead = {
                nome: document.getElementById('Nome-completo').value,
                cpf: document.getElementById('cpf').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                cidade_UF: document.getElementById('cidade-UF').value
            };
            try {
                const response = await fetch('http://127.0.0.1:5000/novo_lead', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(novoLead)
                });

                const resultado = await response.json();

                if (response.ok) {
                    novoLead.id = Date.now();
                    leads.push(novoLead);
                    formNovoLead.reset();
                    renderizarLeads();
                    mostrarAlerta('Lead adicionado com sucesso na base de dados!', 'success');
                } else {
                    mostrarAlerta('Erro: ' + resultado.error, 'danger');
                }
            } catch (erro) {
                mostrarAlerta('Erro ao enviar dados: ' + erro.message, 'danger');
                console.error('Erro:', erro);
            }
            fetch('http://127.0.0.1:5000/get_leads')
                .then(res => res.json())
                .then(data => {
                    console.log("debug leads carregados", data);
                    // console.log("debug leads carregados", leads);
                    renderizarLeads(data);
                })
                .catch(erro => {
                    mostrarAlerta('Erro ao carregar leads: ' + erro.message, 'danger');
                    console.error('Erro:', erro);
                })
        });
                

        // Renderizar leads
        function renderizarLeads(leadsParaRenderizar) {
            if (leadsParaRenderizar.length === 0) {
                console.log("debug", "Nenhum lead para renderizar");
                leadsContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-inbox"></i>
                        <h5>Nenhum lead cadastrado</h5>
                        <p>Adicione seu primeiro lead usando o formulário acima</p>
                    </div>
                `;
                return;
            }
            console.log("debug--", leadsParaRenderizar.length);
            leadsContainer.innerHTML = leadsParaRenderizar.map(lead => `
                <div class="lead-item">
                    <div class="lead-info">
                        <h5>${lead.nome}</h5>
                        <p><strong>Email:</strong> ${lead.email}</p>
                        <p><strong>Telefone:</strong> ${lead.telefone}</p>
                        <p><strong>Cidade/UF:</strong> ${lead.cidade_UF}</p>
                    </div>
                    <div class="lead-actions">
                        <button class="btn btn-sm btn-outline-primary" onclick="editarLead(${lead.id})" title="Editar">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deletarLead(${lead.id})" title="Deletar">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            
        }
        function deletarLead(leadId){
            console.log("teste delet")
            fetch("http://127.0.0.1:5000/deletar_lead/" + leadId, {
                method: "DELETE"
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    mostrarAlerta(data.message, 'success');
                    fetch('http://127.0.0.1:5000/get_leads')
                        .then(res => res.json())
                        .then(data => {
                            renderizarLeads(data);
                        });
                } else {
                    mostrarAlerta('Erro: ' + data.error, 'danger');
                }
            })
            .catch(erro => {
                mostrarAlerta('Erro ao deletar lead: ' + erro.message, 'danger');
                console.error('Erro:', erro);
            });
        }

        function editarLead(leadId){
            fetch("http://127.0.0.1:5000/editar_lead/" + leadId, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    // Adicione os dados do lead aqui
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    mostrarAlerta(data.message, 'success');
                    fetch('http://127.0.0.1:5000/get_leads')
                        .then(res => res.json())
                        .then(data => {
                            renderizarLeads(data);
                        });
                } else {
                    mostrarAlerta('Erro: ' + data.error, 'danger');
                }
            })
            .catch(erro => {
                mostrarAlerta('Erro ao editar lead: ' + erro.message, 'danger');
                console.error('Erro:', erro);
            });
        }

        // Buscar e filtrar
        
        

        // Mostrar alerta
        function mostrarAlerta(mensagem, tipo = 'info') {
            const alerta = document.createElement('div');
            alerta.className = `alert alert-${tipo} alert-dismissible fade show`;
            alerta.role = 'alert';
            alerta.innerHTML = `
                ${mensagem}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            const container = document.querySelector('.container-lg');
            container.insertBefore(alerta, container.firstChild);
            
            setTimeout(() => alerta.remove(), 40000);
        }

        // Renderizar na carga inicial
        fetch('http://127.0.0.1:5000/get_leads')
            .then(res => res.json())
            .then(data => {
                console.log("debug leads carregados", data);
                // console.log("debug leads carregados", leads);
                renderizarLeads(data);
            })
            .catch(erro => {
                mostrarAlerta('Erro ao carregar Leads: ' + erro.message, 'danger');
                console.error('Erro:', erro);
            })
        
       
    </script>
    <script src="{{ url_for('static', filename='templats.js') }}"></script>
</body>
</html>
